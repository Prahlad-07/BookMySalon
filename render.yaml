services:
  - type: web
    name: bookmysalon-backend
    runtime: docker
    plan: free
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SECURITY_JWT_SECRET
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:3000,http://localhost:5173,https://*.vercel.app
      - key: APP_OTP_DEV_MODE
        value: "false"
      - key: OTP_EMAIL_ENABLED
        value: "true"
      - key: OTP_EMAIL_FROM
        sync: false
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: "true"
      - key: APP_OAUTH2_ENABLED
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_OAUTH2_REDIRECT_URI
        sync: false
      - key: APP_OAUTH2_FAILURE_URI
        sync: false
      - key: MSG91_ENABLED
        value: "false"
      - key: MSG91_AUTHKEY
        sync: false
      - key: OTP_SMS_ENABLED
        value: "false"
      - key: OTP_SMS_DEFAULT_COUNTRY_CODE
        value: "+91"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
